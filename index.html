                                inline_keyboard: [[
                                    { text: "Accept ✅", callback_data: `accept_${newOrderId}` },
                                    { text: "Reject ❌", callback_data: `reject_${newOrderId}` }
                                ]]
                            }
                        })
                    });
                } catch (e) {}
                setTimer(180);
                setOrderSuccess(true);
            };

            const isFormValid = () => {
                if (!selectedProduct) return false;
                const isRemoteValid = selectedProduct.category !== 'rent' || (remoteTool === 'ultra' ? (ultraId.trim() && ultraPass.trim()) : anyDeskId.trim());
                const isPaymentValid = paymentType === 'vodafone' ? senderPhone.trim().length >= 11 : binanceTx.trim().length > 0;
                if (selectedProduct.category === 'credit' || selectedProduct.category === 'server') {
                    const isContactValid = selectedProduct.category === 'credit' ? email.trim().includes('@') : whatsappNumber.trim().length >= 11;
                    const min = selectedProduct.minQty || 1;
                    const isQuantityValid = quantity >= min;
                    return isRemoteValid && isPaymentValid && isContactValid && isQuantityValid;
                }
                return isRemoteValid && isPaymentValid;
            };

            return (
                <div className="min-h-screen pb-20 font-sans" dir={t.dir}>
                    <a href={WHATSAPP_LINK} target="_blank" rel="noreferrer" className="fixed bottom-6 right-6 z-[90] bg-[#25D366] text-white p-4 rounded-full shadow-lg hover:scale-110 transition-transform">
                        <WhatsAppIcon className="w-8 h-8" />
                    </a>
                    
                    <nav className="bg-white/90 backdrop-blur-md border-b px-4 py-4 sticky top-0 z-50 shadow-sm">
                        <div className="max-w-7xl mx-auto flex items-center justify-between gap-4">
                            <span className="text-xl md:text-2xl font-black text-blue-600 tracking-tighter uppercase shrink-0">WALID SALA7</span>
                            <div className="flex items-center gap-2 overflow-x-auto no-scrollbar">
                                <div className="flex items-center bg-slate-100 p-1 rounded-xl shrink-0">
                                    <button onClick={() => setCurrency('USD')} className={`px-3 py-1 rounded-lg text-xs font-bold transition-all ${currency === 'USD' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}`}>{t.usd}</button>
                                    <button onClick={() => setCurrency('EGP')} className={`px-3 py-1 rounded-lg text-xs font-bold transition-all ${currency === 'EGP' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}`}>{t.egp}</button>
                                </div>
                                <div className="flex items-center bg-slate-100 p-1 rounded-xl shrink-0">
                                    <button onClick={() => setLang('ar')} className={`px-3 py-1 rounded-lg text-xs font-bold transition-all ${lang === 'ar' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}`}>العربية</button>
                                    <button onClick={() => setLang('en')} className={`px-3 py-1 rounded-lg text-xs font-bold transition-all ${lang === 'en' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}`}>English</button>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto p-4 md:p-8">
                        <div className="mb-12 text-center">
                            <h1 className="text-4xl md:text-6xl font-black text-slate-900 mb-4">{t.title}</h1>
                            <p className="text-blue-600 font-extrabold text-xl md:text-2xl mb-8">{t.subtitle}</p>
                            
                            <div className="max-w-2xl mx-auto mb-8 relative">
                                <div className={`absolute ${t.dir === 'rtl' ? 'right-4' : 'left-4'} top-1/2 -translate-y-1/2 text-slate-400`}><IconSearch /></div>
                                <input type="text" placeholder={t.searchPlaceholder} value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className={`w-full ${t.dir === 'rtl' ? 'pr-12 pl-6' : 'pl-12 pr-6'} py-4 rounded-2xl border-2 border-slate-100 focus:border-blue-500 outline-none font-bold shadow-sm transition-all`} />
                            </div>

                            <div className="flex justify-center gap-4 mb-8 overflow-x-auto no-scrollbar py-2">
                                <button onClick={() => setCurrentCategory('rent')} className={`px-8 py-3 rounded-2xl font-black transition-all whitespace-nowrap ${currentCategory === 'rent' ? 'bg-blue-600 text-white shadow-xl scale-105' : 'bg-white text-slate-600 border'}`}>{t.rentalsTab}</button>
                                <button onClick={() => setCurrentCategory('credit')} className={`px-8 py-3 rounded-2xl font-black transition-all whitespace-nowrap ${currentCategory === 'credit' ? 'bg-blue-600 text-white shadow-xl scale-105' : 'bg-white text-slate-600 border'}`}>{t.creditsTab}</button>
                                <button onClick={() => setCurrentCategory('server')} className={`px-8 py-3 rounded-2xl font-black transition-all whitespace-nowrap ${currentCategory === 'server' ? 'bg-blue-600 text-white shadow-xl scale-105' : 'bg-white text-slate-600 border'}`}>{t.serverTab}</button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-20">
                            {productsData.filter(p => p.category === currentCategory).filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase())).map((product) => (
                                <div key={product.id} className="bg-white rounded-[2rem] overflow-hidden border border-slate-100 shadow-sm hover:shadow-xl transition-all flex flex-col group">
                                    <div className="h-36 bg-white flex items-center justify-center relative overflow-hidden">
                                        <img src={product.image} alt={product.name} className="h-full w-full object-cover transition-transform group-hover:scale-110" />
                                    </div>
                                    <div className="p-6 flex flex-col flex-grow">
                                        <h3 className="font-bold text-slate-800 text-lg mb-4 h-14 line-clamp-2">{product.name}</h3>
                                        <div className="flex justify-between items-center mt-auto">
                                            <div>
                                                <p className="text-slate-400 text-[10px] font-black uppercase tracking-widest">{t.priceLabel}</p>
                                                <p className="text-2xl font-black text-blue-600 leading-none">{formatPrice(product.priceUsd, false, product.category === 'credit')}</p>
                                            </div>
                                            <button onClick={() => { setSelectedProduct(product); setOrderSuccess(false); setQuantity(product.minQty || 1); }} className="bg-slate-900 text-white px-6 py-3 rounded-2xl font-black text-sm hover:bg-blue-600 transition-all active:scale-95">{t.rentNow}</button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="bg-white rounded-[2.5rem] p-8 md:p-12 border border-slate-100 shadow-sm max-w-4xl mx-auto text-center">
                            <h2 className="text-3xl font-black text-slate-900 mb-10 flex items-center justify-center gap-4"><IconWallet className="text-blue-600" /> {t.paymentTitle}</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="p-6 rounded-3xl bg-rose-50/50 border border-rose-100 flex items-center justify-between group hover:bg-rose-50 transition-colors">
                                    <div className="flex items-center gap-4">
                                        <div className="p-1 bg-white rounded-2xl shadow-sm overflow-hidden"><img src={VODAFONE_QR_URL} alt="Vodafone" className="w-12 h-12 object-contain" /></div>
                                        <span className="font-black text-rose-900">{t.vodafone}</span>
                                    </div>
                                    <button onClick={() => handleCopy(VODAFONE_NUMBER, 'v1')} className="font-mono font-bold text-sm text-rose-600 bg-white px-4 py-2 rounded-xl border border-rose-100 flex items-center gap-2">
                                        {copyStatus === 'v1' ? <IconCheckCircle size={16} /> : <img src={VODAFONE_QR_URL} className="w-4 h-4 object-contain" />} {VODAFONE_NUMBER}
                                    </button>
                                </div>
                                <div className="p-6 rounded-3xl bg-amber-50/50 border border-amber-100 flex items-center justify-between group hover:bg-amber-50 transition-colors">
                                    <div className="flex items-center gap-4">
                                        <div className="p-1 bg-white rounded-2xl shadow-sm overflow-hidden"><img src={BINANCE_QR_URL} alt="Binance" className="w-12 h-12 object-contain" /></div>
                                        <span className="font-black text-amber-900">{t.binance}</span>
                                    </div>
                                    <button onClick={() => handleCopy(BINANCE_ID, 'b1')} className="font-mono font-bold text-sm text-amber-600 bg-white px-4 py-2 rounded-xl border border-amber-100 flex items-center gap-2">
                                        {copyStatus === 'b1' ? <IconCheckCircle size={16} /> : <img src={BINANCE_QR_URL} className="w-4 h-4 object-contain" />} {BINANCE_ID}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </main>

                    {selectedProduct && (
                        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-0 sm:p-4 bg-slate-900/40 backdrop-blur-md">
                            <div className="bg-white rounded-t-[2rem] sm:rounded-[3rem] w-full max-w-md max-h-[90vh] overflow-y-auto shadow-2xl">
                                <div className="p-8 border-b flex justify-between items-center bg-slate-50/50 sticky top-0 z-10">
                                    <h3 className="font-black text-slate-900 text-2xl">{t.selectPayment}</h3>
                                    <button onClick={() => setSelectedProduct(null)} className="p-2 hover:bg-slate-200 rounded-full transition-colors"><IconX /></button>
                                </div>
                                <div className="p-8 space-y-8">
                                    {orderSuccess ? (
                                        <div className="flex flex-col items-center justify-center py-8 text-center">
                                            {orderStatus === "pending" ? (
                                                <Fragment>
                                                    <div className="loader"></div>
                                                    <h3 className="font-black text-slate-900 text-xl">{t.verifying}</h3>
                                                    <h1 className="text-[3.5rem] text-blue-600 my-4 font-[900] leading-none">{timer}</h1>
                                                    <p className="text-slate-500 font-bold">{t.waitOwner}</p>
                                                    <button onClick={() => { setOrderSuccess(false); setSelectedProduct(null); }} className="mt-8 text-slate-400 font-bold">{t.cancelProcess}</button>
                                                </Fragment>
                                            ) : orderStatus === "accepted" ? (
                                                <div className="flex flex-col items-center">
                                                    <div className="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-6"><IconCheck size={64} /></div>
                                                    <h3 className="font-black text-slate-900 text-2xl mb-2">{t.accepted}</h3>
                                                    <p className="text-slate-500 font-bold">{t.acceptedMsg}</p>
                                                    <button onClick={() => setSelectedProduct(null)} className="mt-8 bg-green-600 text-white px-8 py-3 rounded-2xl font-bold w-full">{t.close}</button>
                                                </div>
                                            ) : (
                                                <div className="flex flex-col items-center">
                                                    <div className="w-24 h-24 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center mb-6"><IconX size={64} /></div>
                                                    <h3 className="font-black text-slate-900 text-2xl mb-4">{t.rejected}</h3>
                                                    <button onClick={() => setOrderSuccess(false)} className="text-slate-400 font-bold">{t.backToStore}</button>
                                                </div>
                                            )}
                                        </div>
                                    ) : (
                                        <Fragment>
                                            <div className="flex items-center gap-4 p-6 bg-blue-50 rounded-[2rem] border border-blue-100">
                                                <div className="w-20 h-20 bg-white rounded-2xl overflow-hidden border border-blue-100 shrink-0"><img src={selectedProduct.image} alt={selectedProduct.name} className="w-full h-full object-cover" /></div>
                                                <div className="flex-grow">
                                                    <p className="text-blue-500 text-[10px] font-black uppercase mb-1">{t.productLabel}</p>
                                                    <span className="font-black text-blue-900 text-lg block leading-tight">{selectedProduct.name}</span>
                                                    {selectedProduct.duration && <span className="text-blue-600 text-sm font-black mt-1 block">Rent For [ {selectedProduct.duration} ]</span>}
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="p-4 bg-slate-50 rounded-3xl border border-slate-100">
                                                    <p className="text-slate-400 text-[10px] font-black uppercase mb-1">{t.priceLabel}</p>
                                                    <p className="text-xl font-black text-blue-600 leading-none">{formatPrice(selectedProduct.priceUsd, true, selectedProduct.category !== 'rent')}</p>
                                                </div>
                                                <div className="p-4 bg-slate-50 rounded-3xl border border-slate-100 flex flex-col justify-center">
                                                    <p className="text-slate-400 text-[10px] font-black uppercase mb-1">{t.totalUsd}</p>
                                                    <p className="text-xl font-black text-slate-700 leading-none">${(selectedProduct.priceUsd * quantity).toFixed(2)}</p>
                                                </div>
                                            </div>

                                            {(selectedProduct.category === 'credit' || selectedProduct.category === 'server') && (
                                                <div className="space-y-4 p-4 bg-slate-50 rounded-3xl border border-slate-200">
                                                    <div><label className="block text-sm font-bold text-slate-700 mb-1">{t.quantityLabel}</label><input type="number" value={quantity} onChange={(e) => setQuantity(parseInt(e.target.value) || 0)} className="w-full px-4 py-3 rounded-xl border-2 font-bold" /></div>
                                                    {selectedProduct.category === 'credit' ? (
                                                        <div><label className="block text-sm font-bold text-slate-700 mb-1">{t.emailLabel}</label><input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="example@mail.com" className="w-full px-4 py-3 rounded-xl border-2 font-bold" /></div>
                                                    ) : (
                                                        <div><label className="block text-sm font-bold text-slate-700 mb-1">{t.whatsappNumberLabel}</label><input type="text" value={whatsappNumber} onChange={(e) => setWhatsappNumber(e.target.value)} placeholder={t.whatsappNumberPlaceholder} className="w-full px-4 py-3 rounded-xl border-2 font-bold" /></div>
                                                    )}
                                                </div>
                                            )}

                                            {selectedProduct.category === 'rent' && (
                                                <div className="space-y-4">
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <button onClick={() => setRemoteTool('ultra')} className={`p-5 rounded-3xl border-2 flex flex-col items-center gap-3 ${remoteTool === 'ultra' ? 'border-blue-500 bg-blue-50' : 'border-slate-100'}`}><IconMonitor className={remoteTool === 'ultra' ? 'text-blue-600' : 'text-slate-400'} /><span className="text-sm font-black">UltraViewer</span></button>
                                                        <button onClick={() => setRemoteTool('anydesk')} className={`p-5 rounded-3xl border-2 flex flex-col items-center gap-3 ${remoteTool === 'anydesk' ? 'border-red-500 bg-red-50' : 'border-slate-100'}`}><IconLaptop className={remoteTool === 'anydesk' ? 'text-red-600' : 'text-slate-400'} /><span className="text-sm font-black">AnyDesk</span></button>
                                                    </div>
                                                    {remoteTool === 'ultra' ? (
                                                        <Fragment><input type="text" placeholder={t.ultraId} value={ultraId} onChange={(e) => setUltraId(e.target.value)} className="w-full px-6 py-4 rounded-2xl border-2 text-center font-mono font-bold" /><input type="text" placeholder={t.ultraPass} value={ultraPass} onChange={(e) => setUltraPass(e.target.value)} className="w-full px-6 py-4 rounded-2xl border-2 text-center font-mono font-bold" /></Fragment>
                                                    ) : ( <input type="text" placeholder={t.anyDeskId} value={anyDeskId} onChange={(e) => setAnyDeskId(e.target.value)} className="w-full px-6 py-4 rounded-2xl border-2 text-center font-mono font-bold" /> )}
                                                </div>
                                            )}

                                            <div className="space-y-4">
                                                <div className="grid grid-cols-2 gap-4">
                                                    <button onClick={() => setPaymentType('vodafone')} className={`p-5 rounded-3xl border-2 flex flex-col items-center gap-3 ${paymentType === 'vodafone' ? 'border-rose-500 bg-rose-50' : 'border-slate-100'}`}>{paymentType === 'vodafone' ? <img src={VODAFONE_QR_URL} className="w-6 h-6 object-contain" /> : <IconSmartphone className="text-slate-400" />}<span className="text-sm font-black">{t.vodafone}</span></button>
                                                    <button onClick={() => setPaymentType('binance')} className={`p-5 rounded-3xl border-2 flex flex-col items-center gap-3 ${paymentType === 'binance' ? 'border-amber-500 bg-amber-50' : 'border-slate-100'}`}>{paymentType === 'binance' ? <img src={BINANCE_QR_URL} className="w-6 h-6 object-contain" /> : <IconQr className="text-slate-400" />}<span className="text-sm font-black">{t.binance}</span></button>
                                                </div>
                                            </div>

                                            {paymentType === 'binance' ? (
                                                <div className="space-y-4">
                                                    <div className="p-6 bg-amber-50 rounded-[2rem] border-2 border-amber-200 shadow-inner">
                                                        <div className="text-center mb-4"><span className="text-[12px] text-amber-700 font-black uppercase tracking-[0.2em]">{t.binanceIdLabel}</span><div className="mt-2 flex items-center justify-center gap-3"><span className="text-3xl font-black text-amber-900 font-mono tracking-tight">{BINANCE_ID}</span><button onClick={() => handleCopy(BINANCE_ID, 'm_b')} className="p-2 bg-white rounded-xl shadow-md border border-amber-100 overflow-hidden">{copyStatus === 'm_b' ? <IconCheckCircle size={24} className="text-green-500" /> : <img src={BINANCE_QR_URL} className="w-6 h-6 object-contain" />}</button></div></div>
                                                        <div className="bg-white/50 p-3 rounded-2xl border border-amber-100"><p className="text-xs text-amber-800 font-bold text-center leading-relaxed">{t.instructionBinance}</p></div>
                                                    </div>
                                                    <input type="text" placeholder={t.binanceTxPlaceholder} value={binanceTx} onChange={(e) => setBinanceTx(e.target.value)} className="w-full px-6 py-4 rounded-2xl border-2 text-center font-bold" />
                                                </div>
                                            ) : (
                                                <div className="space-y-4">
                                                    <div className="p-6 bg-rose-50 rounded-[2rem] border-2 border-rose-200 shadow-inner">
                                                        <div className="text-center mb-4"><span className="text-[12px] text-rose-700 font-black uppercase tracking-[0.2em]">{t.vodafoneNumberLabel}</span><div className="mt-2 flex items-center justify-center gap-3"><span className="text-3xl font-black text-rose-900 font-mono tracking-tight">{VODAFONE_NUMBER}</span><button onClick={() => handleCopy(VODAFONE_NUMBER, 'm_v')} className="p-2 bg-white rounded-xl shadow-md border border-rose-100 overflow-hidden">{copyStatus === 'm_v' ? <IconCheckCircle size={24} className="text-green-500" /> : <img src={VODAFONE_QR_URL} className="w-6 h-6 object-contain" />}</button></div></div>
                                                        <div className="bg-white/50 p-3 rounded-2xl border border-rose-100"><p className="text-xs text-rose-800 font-bold text-center leading-relaxed">{t.instructionVodafone}</p></div>
                                                    </div>
                                                    <input type="text" placeholder={t.senderPhonePlaceholder} value={senderPhone} onChange={(e) => setSenderPhone(e.target.value)} className="w-full px-6 py-4 rounded-2xl border-2 text-center font-bold" />
                                                </div>
                                            )}

                                            <div className="bg-amber-100 border-l-4 border-amber-500 p-4 rounded-xl flex items-center gap-3"><IconAlert className="text-amber-600" /><p className="text-amber-900 font-black text-xs leading-tight">{t.preOrderAlert}</p></div>
                                            <div className="text-center"><a href={WHATSAPP_LINK} target="_blank" rel="noreferrer" className="text-blue-600 font-bold text-sm hover:underline flex items-center justify-center gap-2"><WhatsAppIcon className="w-4 h-4" /> {t.helpText}</a></div>
                                            <button onClick={handleFinalOrder} disabled={!isFormValid()} className="w-full bg-blue-600 hover:bg-green-600 disabled:bg-slate-100 text-white font-black py-5 rounded-3xl text-xl transition-all">{t.confirmOrder}</button>
                                        </Fragment>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="text-center py-16 px-4">
                        <p className="text-slate-400 text-[10px] font-black tracking-[0.3em] uppercase">Walid Sala7 &copy; {new Date().getFullYear()} - {t.rights}</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
